<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="https://raw.githubusercontent.com/elm-explorations/rte-toolkit/master/logo.png"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tea Cup RTE Toolkit Demo</title>
    <style>
      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Helvetica Neue', Arial, sans-serif;
        background-color: #f9fafb;
        color: #111827;
      }
      .initial-loader-wrap {
        display: flex;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        align-items: center;
        justify-content: center;
        background-color: #0b0f19;
      }
      .initial-loader {
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-top: 4px solid #6366f1;
        border-radius: 50%;
        animation: initial-spin 1s linear infinite;
      }
      @keyframes initial-spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader-wrap">
        <div class="initial-loader"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
